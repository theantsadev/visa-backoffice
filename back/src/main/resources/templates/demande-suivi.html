<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi de demande</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/demande.css" th:href="@{/css/demande.css(v=${cacheBuster})}">
</head>
<body>
    <main class="page-shell">
        <section class="hero-card confirmation-card">
            <p class="eyebrow">Suivi de dossier</p>
            <h1>Consulter l'etat de la demande</h1>
            <p class="subtitle">Le suivi affiche le dossier reference, les demandes liees et l'historique des statuts.</p>
            <div class="cta-row" style="justify-content:center;">
                <a class="btn btn-outline" href="/" th:href="@{/}">Accueil</a>
                <a class="btn btn-ghost" href="/demande/liste" th:href="@{/demande/liste}">Liste des demandes</a>
            </div>
        </section>

        <section class="form-card">
            <div id="suiviFeedback" class="feedback">Chargement du suivi...</div>
            <div id="suiviContent" class="detail-content" hidden></div>
        </section>
    </main>

    <script th:src="@{/js/demande-suivi.js(v=${cacheBuster})}" src="/js/demande-suivi.js"></script>
</body>
</html>
